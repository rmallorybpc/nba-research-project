<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Analysis | Overview</title>
    <link rel="stylesheet" href="assets/tmg-styles.css" />
    <script defer src="assets/nav.js"></script>
  </head>
  <body>
    <div id="tmg-nav-host"></div>
    <main>
      <h1>Overview</h1>
      <section class="card">
        <h2>Team Movement Impact Score (MIS) Rankings</h2>
        <div class="filters" aria-label="MIS filters">
          <label for="season-filter">Season</label>
          <select id="season-filter">
            <option value="all">All Seasons</option>
            <option value="loading">Loading...</option>
          </select>

          <label for="division-filter">Division</label>
          <select id="division-filter">
            <option value="all">All Divisions</option>
            <option value="Atlantic">Atlantic</option>
            <option value="Central">Central</option>
            <option value="Southeast">Southeast</option>
            <option value="Northwest">Northwest</option>
            <option value="Pacific">Pacific</option>
            <option value="Southwest">Southwest</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Team</th>
                <th>Division</th>
                <th>Season</th>
                <th>MIS</th>
              </tr>
            </thead>
            <tbody id="mis-table-body">
              <tr>
                <td class="placeholder">Loading...</td>
                <td class="placeholder">Loading...</td>
                <td class="placeholder">Loading...</td>
                <td class="placeholder">Loading...</td>
                <td class="placeholder">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
      <p class="links">
        <a href="index.html">Welcome</a>
        <a href="findings.html">Key Findings</a>
        <a href="overview.html">Overview</a>
        <a href="team.html">Team</a>
        <a href="explorer.html">Explorer</a>
        <a href="sandbox.html">Sandbox</a>
      </p>
    </main>
    <script>
      const BASE = "/nba-research-project";
      const divisions = [
        "Atlantic",
        "Central",
        "Southeast",
        "Northwest",
        "Pacific",
        "Southwest",
      ];
      let misRows = [];

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderRows(rows) {
        const body = document.getElementById("mis-table-body");
        if (!body) {
          return;
        }

        if (!rows.length) {
          body.innerHTML = `
            <tr>
              <td class="placeholder">Loading...</td>
              <td class="placeholder">Loading...</td>
              <td class="placeholder">Loading...</td>
              <td class="placeholder">Loading...</td>
              <td class="placeholder">Loading...</td>
            </tr>
          `;
          return;
        }

        body.innerHTML = rows
          .map(
            (row) => `
            <tr>
              <td>${escapeHtml(row.rank || "Loading...")}</td>
              <td>${escapeHtml(row.team || "Loading...")}</td>
              <td>${escapeHtml(row.division || "Loading...")}</td>
              <td>${escapeHtml(row.season || "Loading...")}</td>
              <td>${escapeHtml(row.mis || "Loading...")}</td>
            </tr>
          `
          )
          .join("");
      }

      function applyFilters() {
        const seasonFilter = document.getElementById("season-filter");
        const divisionFilter = document.getElementById("division-filter");
        if (!seasonFilter || !divisionFilter) {
          return;
        }

        let filtered = misRows.slice();
        if (seasonFilter.value !== "all") {
          filtered = filtered.filter((row) => row.season === seasonFilter.value);
        }
        if (divisionFilter.value !== "all") {
          filtered = filtered.filter(
            (row) => row.division === divisionFilter.value
          );
        }

        renderRows(filtered);
      }

      async function loadMisTable() {
        const seasonFilter = document.getElementById("season-filter");
        const divisionFilter = document.getElementById("division-filter");

        if (seasonFilter) {
          seasonFilter.addEventListener("change", applyFilters);
        }
        if (divisionFilter) {
          divisionFilter.addEventListener("change", applyFilters);
        }

        try {
          const response = await fetch(
            `${BASE}/assets/data/team_mis_by_season.csv`
          );
          if (response.ok) {
            const text = await response.text();
            const lines = text
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean);

            if (lines.length > 1) {
              const headers = lines[0].split(",").map((header) => header.trim());
              const rows = lines.slice(1).map((line) => {
                const values = line.split(",").map((value) => value.trim());
                const row = {};
                headers.forEach((header, idx) => {
                  row[header.toLowerCase()] = values[idx] || "";
                });
                return {
                  rank: row.rank || "",
                  team: row.team || row.team_name || "",
                  division: divisions.includes(row.division)
                    ? row.division
                    : "",
                  season: row.season || "",
                  mis: row.mis || row.movement_impact_score || "",
                };
              });

              misRows = rows;

              if (seasonFilter) {
                const seasons = [...new Set(rows.map((row) => row.season))]
                  .filter(Boolean)
                  .sort();
                seasonFilter.innerHTML =
                  '<option value="all">All Seasons</option>' +
                  seasons
                    .map(
                      (season) =>
                        `<option value="${escapeHtml(season)}">${escapeHtml(
                          season
                        )}</option>`
                    )
                    .join("");
              }

              applyFilters();
              return;
            }
          }
        } catch (_err) {
          // Keep placeholders when CSV is not available yet.
        }

        renderRows([]);
      }

      loadMisTable();
    </script>
  </body>
</html>
