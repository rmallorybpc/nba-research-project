<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Analysis | Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/tmg-styles.css" />
    <script defer src="assets/nav.js"></script>
  </head>
  <body>
    <div id="tmg-nav-host"></div>
    <main class="tmg-page">
      <div class="tmg-container">
        <header class="tmg-page-header">
          <p class="tmg-eyebrow">The Mallory Group</p>
          <h1 class="tmg-page-title">Explorer</h1>
          <p class="tmg-page-desc">
            Interactive exploration surface for segmented comparisons and drill-down.
          </p>
        </header>

        <section class="tmg-bento-grid">
          <article
            class="tmg-card"
            role="group"
            aria-label="Explorer data status"
          >
            <p class="tmg-card-label">Pipeline status</p>
            <h2 class="tmg-card-title">Explorer dataset readiness</h2>
        <p>Interactive exploration placeholder.</p>
        <p>Status: <span class="placeholder" id="status">Loading...</span></p>
          </article>
        </section>

        <footer class="tmg-footer">TMG Tool Suite · NBA Analysis</footer>
      </div>
    </main>
    <script>
      const BASE = "/nba-research-project";
      async function loadStatus() {
        const target = document.getElementById("status");
        try {
          const response = await fetch(`${BASE}/assets/data/explorer.csv`);
          if (response.ok) {
            const text = await response.text();
            if (text.trim()) {
              target.textContent = "Loaded";
            }
          }
        } catch (_err) {
          // Keep placeholder text while data files are still empty/missing.
        }
      }
      loadStatus();
    </script>
  </body>
</html>
